<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Police - ย้ายที่อยู่</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 2rem;
            position: relative;
            animation: swim 3s ease-in-out infinite;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.6));
        }

        @keyframes swim {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.6));
            }
            50% {
                transform: translateY(-10px) rotate(2deg);
                filter: drop-shadow(0 0 40px rgba(14, 165, 233, 0.9));
            }
        }

        .logo::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        .redirect-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 2.5rem;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .redirect-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.6);
            background: linear-gradient(135deg, #38bdf8, #818cf8);
        }

        .redirect-btn:active {
            transform: translateY(-1px);
        }

        .redirect-btn i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .redirect-btn:hover i {
            transform: translateX(5px);
        }

        .message {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        .message p {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }

        .message a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .redirect-btn {
                padding: 1rem 2rem;
                font-size: 1.1rem;
            }

            .logo {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <video class="video-background" autoplay muted loop playsinline>
        <source src="wallpaper.webm" type="video/webm">
    </video>
    
    <div class="overlay"></div>

    <div class="content">
        <div class="logo">
            <img src="assets/images/LOGO_Shark_Community_OK02-01.png" alt="Shark Police Logo">
        </div>

        <h1>Shark Police</h1>
        <p class="subtitle">ระบบคำนวณค่าปรับ</p>

        <a href="https://shark-police.webhop.me" class="redirect-btn">
            <span>ไปยังเว็บไซต์ใหม่</span>
            <i class="fas fa-arrow-right"></i>
        </a>

        <div class="message">
            <p>
                เว็บไซต์นี้ได้ย้ายไปยังที่อยู่ใหม่แล้ว<br>
                <a href="https://shark-police.webhop.me">https://shark-police.webhop.me</a>
            </p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
</body>
</html>
