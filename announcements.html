    <style>
        [x-cloak] { display: none !important; }
        
        .main-content {
            padding-top: 100px;
            min-height: 100vh;
        }

        @keyframes rotateLogo {
            0% {
                transform: perspective(500px) rotateY(0deg);
            }
            100% {
                transform: perspective(500px) rotateY(360deg);
            }
        }

        /* Modal Styles */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(14, 165, 233, 0.3);
            box-shadow: 0 25px 80px rgba(14, 165, 233, 0.2);
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s ease;
        }

        .modal-backdrop.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .modal-close {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .announcement-text {
            color: #cbd5e1;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-top: 1px solid rgba(14, 165, 233, 0.2);
        }

        .btn-copy {
            flex: 1;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Sarabun', sans-serif;
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4);
        }
    </style>

                            class="text-left p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-cyan-500/50 hover:bg-cyan-900/20 transition-all text-slate-300 group">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fas fa-clipboard-list text-cyan-400"></i>
                            </div>
                            <span class="text-white font-medium">เปิดสอบตำรวจ (15:00-17:00)</span>
                        </div>
                        <p class="text-sm text-slate-400 pl-13">เตรียมความพร้อมมาให้เรียบร้อย สามารถติดต่อในเมืองในช่วงเวลาได้เลย</p>
                    </button>

                    <button @click="openModal('รบกวนออกจากพื้นที่เคอร์ฟิวภายใน 10 วิด้วยครับ เตือนครั้งที่ 1')" 
                            class="text-left p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-pink-500/50 hover:bg-pink-900/20 transition-all text-slate-300 group">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 rounded-lg bg-pink-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fas fa-moon text-pink-400"></i>
                            </div>
                            <span class="text-white font-medium">เตือนเคอร์ฟิว</span>
                        </div>
                        <p class="text-sm text-slate-400 pl-13">รบกวนออกจากพื้นที่เคอร์ฟิวภายใน 10 วิด้วยครับ เตือนครั้งที่ 1</p>
                    </button>

                    <button @click="openModal('รบกวนประชาชนที่จอดรถหน้า สน. เก็บรถด้วยครับ')" 
                            class="text-left p-4 rounded-xl bg-slate-800/50 border border-slate-700 hover:border-yellow-500/50 hover:bg-yellow-900/20 transition-all text-slate-300 group">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 rounded-lg bg-yellow-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fas fa-parking text-yellow-400"></i>
                            </div>
                            <span class="text-white font-medium">แจ้งเก็บรถหน้า สน.</span>
                        </div>
                        <p class="text-sm text-slate-400 pl-13">รบกวนประชาชนที่จอดรถหน้า สน. เก็บรถด้วยครับ</p>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div class="toast-container">
        <template x-for="notification in notifications" :key="notification.id">
            <div 
                class="toast"
                :class="notification.type"
                @click="removeNotification(notification.id)"
            >
                <i class="fas toast-icon" 
                   :class="{
                       'fa-check-circle': notification.type === 'success',
                       'fa-exclamation-circle': notification.type === 'error',
                       'fa-info-circle': notification.type === 'info'
                   }">
                </i>
                <span class="toast-message" x-text="notification.message"></span>
            </div>
        </template>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-credit">
            <p>Shark Police v.0.0.1 | Created by <strong class="text-sky-400">Kaneji Nightfall</strong></p>
        </div>
    </footer>

    <!-- Modal Popup -->
    <div class="modal-backdrop" 
         :class="{ 'active': showModal }" 
         @click.self="closeModal()" 
         x-show="showModal" 
         x-cloak>
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-bullhorn text-sky-400"></i>
                    <span x-text="modalTitle"></span>
                </div>
                <button class="modal-close" @click="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="announcement-text" x-text="modalContent"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-copy" @click="copyFromModal()">
                    <i class="fas fa-copy"></i>
                    <span>คัดลอกข้อความ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- App Script -->
    <script>
        function announcementApp() {
            return {
                notifications: [],
                showModal: false,
                modalTitle: '',
                modalContent: '',

                init() {
                    // Header scroll effect
                    window.addEventListener('scroll', () => {
                        const header = document.querySelector('.header');
                        if (window.scrollY > 50) {
                            header.classList.add('scrolled');
                        } else {
                            header.classList.remove('scrolled');
                        }
                    });

                    // Close modal on ESC key
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && this.showModal) {
                            this.closeModal();
                        }
                    });
                },

                openModal(title, content) {
                    this.modalTitle = title;
                    this.modalContent = content.replace(/\\n/g, '\n');
                    this.showModal = true;
                    document.body.style.overflow = 'hidden';
                },

                closeModal() {
                    this.showModal = false;
                    document.body.style.overflow = '';
                },

                copyFromModal() {
                    navigator.clipboard.writeText(this.modalContent).then(() => {
                        this.showNotification('คัดลอกข้อความประกาศแล้ว!', 'success');
                        setTimeout(() => this.closeModal(), 500);
                    }).catch(() => {
                        this.showNotification('ไม่สามารถคัดลอกได้', 'error');
                    });
                },

                openModal(message) {
                    navigator.clipboard.writeText(message).then(() => {
                        this.showNotification('คัดลอกข้อความประกาศแล้ว!', 'success');
                    }).catch(() => {
                        this.showNotification('ไม่สามารถคัดลอกได้', 'error');
                    });
                },

                showNotification(message, type = 'info') {
                    const id = Date.now();
                    this.notifications.push({ id, message, type });
                    setTimeout(() => {
                        this.notifications = this.notifications.filter(n => n.id !== id);
                    }, 3000);
                },

                removeNotification(id) {
                    this.notifications = this.notifications.filter(n => n.id !== id);
                }
            };
        }
    </script>
    
    <!-- Visual Effects -->
    <script src="assets/js/visual-effects.js"></script>
    
    <!-- Anti-Copy Protection -->
    <script src="assets/js/anti-copy.js"></script>
</body>
</html>
