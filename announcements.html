    <style>
        [x-cloak] { display: none !important; }

        .main-content {
            padding-top: 100px;
            min-height: 100vh;
        }

        /* ===== Logo Animation ===== */
        @keyframes rotateLogo {
            0% { transform: perspective(500px) rotateY(0deg); }
            100% { transform: perspective(500px) rotateY(360deg); }
        }

        /* ===== Modern Modal ===== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.99));
            border-radius: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(14, 165, 233, 0.3);
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 120px rgba(14, 165, 233, 0.15);
            transform: scale(0.85) translateY(50px) rotateX(8deg);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .modal-backdrop.active .modal-content {
            transform: scale(1) translateY(0) rotateX(0);
        }

        /* Glow Ring Effect */
        .modal-content::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1, #0ea5e9);
            background-size: 200% 200%;
            border-radius: 28px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: gradientFlow 4s ease infinite;
        }

        .modal-backdrop.active .modal-content::before {
            opacity: 0.4;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.75rem 2rem;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.12), rgba(99, 102, 241, 0.08));
            border-bottom: 1px solid rgba(14, 165, 233, 0.25);
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-shadow: 0 0 25px rgba(14, 165, 233, 0.4);
        }

        .modal-title-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .modal-close {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.25), rgba(239, 68, 68, 0.15));
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .modal-close:hover {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.45), rgba(239, 68, 68, 0.25));
            border-color: rgba(239, 68, 68, 0.6);
            transform: rotate(90deg) scale(1.08);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
        }

        .modal-body {
            padding: 2.5rem 2rem;
            overflow-y: auto;
            flex: 1;
        }

        /* Custom Scrollbar */
        .modal-body::-webkit-scrollbar { width: 8px; }
        .modal-body::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); border-radius: 4px; }
        .modal-body::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #0ea5e9, #6366f1); border-radius: 4px; }
        .modal-body::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #0284c7, #4f46e5); }

        .announcement-text {
            color: #e2e8f0;
            line-height: 2.1;
            white-space: pre-wrap;
            font-size: 1.05rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            padding: 1.75rem 2rem;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.08), rgba(99, 102, 241, 0.08));
            border-top: 1px solid rgba(14, 165, 233, 0.25);
        }

        .btn-copy {
            flex: 1;
            padding: 1.1rem 2.5rem;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.875rem;
            font-family: 'Sarabun', sans-serif;
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-copy::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.6s ease;
        }

        .btn-copy:hover::before { left: 100%; }
        .btn-copy:hover { transform: translateY(-4px); box-shadow: 0 10px 40px rgba(14, 165, 233, 0.6); }
        .btn-copy:active { transform: translateY(-2px); }
        .btn-copy i { transition: transform 0.4s ease; }
        .btn-copy:hover i { transform: scale(1.25) rotate(-12deg); }

        /* ===== Announcement Cards ===== */
        .announcement-card {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .announcement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .announcement-card:hover::before { opacity: 1; }
        .announcement-card:hover { transform: translateY(-6px) scale(1.02); }

        .announcement-card.featured {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .announcement-card.featured:hover {
            border-color: rgba(239, 68, 68, 0.7);
            box-shadow: 0 10px 50px rgba(239, 68, 68, 0.3);
        }

        .new-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: #fff;
            padding: 0.35rem 0.875rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .card-icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .announcement-card:hover .card-icon-wrapper {
            transform: scale(1.15) rotate(-5deg);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .modal-content { max-height: 92vh; border-radius: 22px; }
            .modal-header { padding: 1.5rem 1.25rem; }
            .modal-body { padding: 2rem 1.25rem; }
            .modal-footer { padding: 1.5rem 1.25rem; flex-direction: column; }
            .btn-copy { width: 100%; }
            .modal-title { font-size: 1.15rem; }
            .modal-title-icon { width: 42px; height: 42px; font-size: 1.1rem; }

            .header-content {
                padding: 0.75rem 1rem;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
            }

            .logo-text h1 {
                font-size: 1.1rem;
            }

            .nav {
                display: none;
            }

            .main-content {
                padding-top: 70px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .announcement-card {
                padding: 1rem;
            }
        }

        /* Small Mobile (320px - 375px) */
        @media (max-width: 375px) {
            .logo-icon {
                width: 35px;
                height: 35px;
            }

            .logo-text h1 {
                font-size: 1rem;
            }

            .taser-icon {
                width: 24px !important;
                height: 24px !important;
            }

            .main-content {
                padding-top: 65px;
            }
        }

        /* Mobile (376px - 480px) */
        @media (max-width: 480px) {
            .header-content {
                padding: 0.75rem 1rem;
            }

            .logo-icon {
                width: 42px;
                height: 42px;
            }

            .logo-text h1 {
                font-size: 1.2rem;
            }

            .main-content {
                padding-top: 75px;
            }

            .container {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }
        }

        /* Medium Mobile (481px - 640px) */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .toast {
                min-width: auto;
                margin: 0 1rem;
                max-width: calc(100% - 2rem);
            }
        }

        /* Landscape orientation */
        @media (orientation: landscape) and (max-height: 500px) {
            .main-content {
                padding-top: 60px;
            }

            .header {
                transform: scale(0.9);
                transform-origin: top center;
            }
        }

        /* Touch-friendly */
        @media (hover: none) and (pointer: coarse) {
            button,
            .announcement-card {
                min-height: 48px;
            }
        }

        /* ===== Taser Icon Animation ===== */
        .taser-icon {
            animation: taserGlow 2s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.6));
        }

        @keyframes taserGlow {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.6)) rotate(0deg);
            }
            50% {
                filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.9)) rotate(-5deg);
            }
        }
    </style>
</head>

                    <button @click="openModal('🦈 ประกาศจากกรมตำรวจ 🦈', 'การเล่นของตำรวจ !!\n\n📢 เรื่องไม้เน้นย้ำ !!\nไม้ 1 คนถึงจุดเคสงานดำต่างๆเป็นคนแรก\nไม้ 2 คนถึงจุดหลังคนแรก หรือ กำลังเสริม\nไม้ 3 คนถึงจุดหลังคนที่สอง หรือ กำลังเสริม\n\nระหว่างการไล่ล่า ไม้ 2 - 3 ควรให้พื้นที่ในการเล่นของไม้ 1 ไม่แทรกไม่แย่งไม้กัน หรือ สื่อสารกันดีๆเล่นกันให้เป็นทีมและเข้าใจกัน\nใครที่จะแทรกเข้ามาช่วยระหว่างทางนั้น ควรสื่อสารกันก่อนว่าจะเข้ามาช่วยเคสตรงนั้น ควรถามก่อนว่าเคสนี้ครบไม้หรือยัง บางทีเขาช่วยไล่กันมาโดนคนอื่นมาแทรกไม้ทำให้เขาหลุดขบวน ฝากเรื่องสื่อสารกันเยอะๆครับ\n\nส่วนเวลาเคสนั้นๆจบ ไม้ 1 จะมีสิทธิ์ในการทำเคสนั้นๆก่อนเสมอ ไม่แย่งกันทำเคสของเจ้าของเคสที่เป็นไม้ 1 ทำให้เกิดการไม่พอใจกันภายใน สน. ควรคำนึงถึงคนมาก่อนเสมอ เล่นด้วยกันให้สนุกครับ ( หากฝ่าฝืนมีโทษ )\n\n📢 การไล่เคส รักษาระยะห่างจากตัวรถผู้ต้องหากันหน่อยนะครับเรื่องนี้ Feedback เยอะ ไม่ต้องรีบไล่ ใช้ระยะเล่นเอา เพราะอาจจะเกิดภาพไม่ตรงหรืออื่นๆ หากตำรวจคนไหนอัดโกโปรได้อัดไว้เซฟตัวเองด้วยนะครับ\n📢 การใช้วิทยุสื่อสาร ( วอ ) สื่อสารกันเยอะๆนะครับ\n📢 เรื่องทำคดีเน้นย้ำ !!\nลงเคสทำคดีทุกครั้งต้องเห็นข้อมูลผู้ต้องหาครบถ้วน ชื่อ/รูปลักษณ์ผู้ต้องหา ลงข้อมูลเคสให้ครบถ้วน ชื่อคดี/ค่าปรับ/แท็กเพื่อนร่วมเคสให้ถูกต้อง\nเน้นย้ำห้ามแท็กคนที่ไม่ได้ไปไล่เคสช่วยเด็ดขาด หากจับได้จะลบเคสโดยไม่ต้องบอก เรียกมารับโทษวินัย\n(การกระทำเหล่านี้ถือว่าโกง เนื่องจากสน.เราปล่อยให้ยืนเล่นยืนเหมอได้ซึ่งได้รับ Playcheck แล้วยังโกงอาจจะมีโทษตามมา )')"

                <i class="fas toast-icon" :class="{
                    'fa-check-circle': notification.type === 'success',
                    'fa-exclamation-circle': notification.type === 'error',
                    'fa-info-circle': notification.type === 'info'

         :class="{ 'active': showModal }"
         @click.self="closeModal()"
         x-show="showModal"
         x-cloak>
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <div class="modal-title-icon">
                        <i class="fas fa-bullhorn text-white"></i>
                    </div>
                    <span x-text="modalTitle"></span>
                </div>
                <button class="modal-close" @click="closeModal()" title="ปิด">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="announcement-text" x-text="modalContent"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-copy" @click="copyFromModal()">
                    <i class="fas fa-copy"></i>
                    <span>คัดลอกข้อความ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- App Script -->
    <script>
        function announcementApp() {
            return {
                notifications: [],
                showModal: false,
                modalTitle: '',
                modalContent: '',

                init() {
                    window.addEventListener('scroll', () => {
                        const header = document.querySelector('.header');
                        if (window.scrollY > 50) {
                            header.classList.add('scrolled');
                        } else {
                            header.classList.remove('scrolled');
                        }
                    });

                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && this.showModal) {
                            this.closeModal();
                        }
                    });
                },

                openModal(title, content) {
                    this.modalTitle = title;
                    this.modalContent = content.replace(/\\n/g, '\n');
                    this.showModal = true;
                    document.body.style.overflow = 'hidden';
                },

                closeModal() {
                    this.showModal = false;
                    document.body.style.overflow = '';
                },

                async copyFromModal() {
                    try {
                        await navigator.clipboard.writeText(this.modalContent);
                        this.showNotification('✅ คัดลอกข้อความประกาศแล้ว!', 'success');
                        setTimeout(() => this.closeModal(), 1000);
                    } catch (err) {
                        this.showNotification('❌ ไม่สามารถคัดลอกได้', 'error');
                    }
                },

                showNotification(message, type = 'info') {
                    const id = Date.now();
                    this.notifications.push({ id, message, type });
                    setTimeout(() => {
                        this.notifications = this.notifications.filter(n => n.id !== id);
                    }, 3000);
                },

                removeNotification(id) {
                    this.notifications = this.notifications.filter(n => n.id !== id);
                }
            };
        }
    </script>
